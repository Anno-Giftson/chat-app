<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chat</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<h1>Chat with <span id="friendName"></span></h1>
<div id="chatBox" style="border:1px solid #000;height:300px;overflow:auto;padding:5px"></div>
<input id="messageInput" placeholder="Type a message">
<button onclick="sendMessage()">Send</button>

<script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
<script>
const socket = io('http://localhost:3000');
const currentUser = localStorage.getItem('currentUser');
const friend = localStorage.getItem('chatFriend');
document.getElementById('friendName').innerText = friend;

const chatId = [currentUser, friend].sort().join('_');

socket.emit('join-chat', { chatId });

const chatBox = document.getElementById('chatBox');

socket.on('chat-history', messages => {
    messages.forEach(m => addMessage(m));
});

socket.on('new-message', message => addMessage(message));

function addMessage(m) {
    const p = document.createElement('p');
    p.innerText = `${m.sender}: ${m.text}`;
    chatBox.appendChild(p);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function sendMessage() {
    const input = document.getElementById('messageInput');
    const text = input.value.trim();
    if (!text) return;
    socket.emit('send-message', { chatId, sender: currentUser, text });
    input.value = '';
}
</script>
</body>
</html>
